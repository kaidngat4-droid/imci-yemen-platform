<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ترويسة رسمية - IMCI Yemen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', 'Tajawal', 'Segoe UI', sans-serif; background: #f0f4f8; }

/* ═══════════════════════════════════════════════ */
/* 🏛️ الترويسة الرسمية */
/* ═══════════════════════════════════════════════ */
.official-header {
background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
border-bottom: 4px solid #C5A028;
position: relative;
}

/* شريط العلم اليمني */
.flag-bar {
display: flex; height: 5px;
}
.flag-red { flex: 1; background: #CE1126; }
.flag-white { flex: 1; background: #FFFFFF; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
.flag-black { flex: 1; background: #000000; }

.header-content {
display: flex; align-items: center; justify-content: space-between;
padding: 20px 30px; max-width: 1200px; margin: 0 auto;
gap: 20px;
}

/* الشعارات */
.logo-box {
text-align: center; min-width: 100px;
}
.logo-img {
width: 90px; height: 90px; border-radius: 50%;
border: 3px solid #C5A028; object-fit: contain;
background: white; padding: 5px;
box-shadow: 0 4px 15px rgba(197,160,40,0.3);
}
.logo-label {
font-size: 11px; color: #1a3a4a; font-weight: bold;
margin-top: 5px; line-height: 1.4;
}

/* النص المركزي */
.center-text { text-align: center; flex: 1; }
.main-title {
font-size: 28px; font-weight: 900; color: #1a3a4a;
letter-spacing: 2px; margin-bottom: 5px;
}
.sub-title {
font-size: 18px; font-weight: 700; color: #1a5f7a;
letter-spacing: 1px; margin-bottom: 3px;
}
.tagline {
font-size: 13px; color: #666;
}

@media (max-width: 768px) {
.header-content { flex-wrap: wrap; justify-content: center; padding: 15px; }
.logo-img { width: 60px; height: 60px; }
.main-title { font-size: 20px; }
.sub-title { font-size: 14px; }
.logo-label { font-size: 9px; }
}
</style>
</head>
<body>

<header class="official-header">
<div class="flag-bar">
<div class="flag-red"></div>
<div class="flag-white"></div>
<div class="flag-black"></div>
</div>

<div class="header-content">
<div class="logo-box">
<img src="https://www.moh.gov.ye/wp-content/uploads/2023/01/logo.png" 
alt="وزارة الصحة" class="logo-img"
onerror="this.style.display='none'">
<div class="logo-label">وزارة الصحة<br>والبيئة</div>
</div>

<div class="center-text">
<div class="main-title">الجمهورية اليمنية</div>
<div class="sub-title">وزارة الصحة العامة والبيئة</div>
<div class="tagline">برنامج الإدارة المتكاملة لصحة الطفل (IMCI)</div>
</div>

<div class="logo-box">
<div style="width:90px;height:90px;border-radius:50%;border:3px solid #C5A028;
background:linear-gradient(135deg,#1a5f7a,#2d8f8f);display:flex;
align-items:center;justify-content:center;font-size:45px;
box-shadow:0 4px 15px rgba(26,95,122,0.3);">
🏥
</div>
<div class="logo-label">برنامج IMCI<br>اليمن</div>
</div>
</div>
</header>

<div style="max-width:1200px;margin:30px auto;padding:20px;text-align:center;">
<h2 style="color:#1a5f7a;">الترويسة الرسمية جاهزة</h2>
<p style="color:#666;">يمكن نسخ هذا الكود وإضافته لأي صفحة في المنصة</p>
</div>

</body>
</html>
