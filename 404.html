<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - الصفحة غير موجودة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Amiri', 'Cairo', serif; background: linear-gradient(135deg, #0d9488, #134e4a); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; padding: 20px; }
.error-code { font-size: 120px; font-weight: 900; color: #d4af37; text-shadow: 0 0 30px rgba(212,175,55,0.5); }
h1 { font-size: 2rem; margin: 20px 0; }
p { opacity: 0.9; margin-bottom: 30px; font-size: 1.1rem; }
.btn { display: inline-block; padding: 14px 35px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; }
.btn-home { background: #d4af37; color: #1a1a1a; }
.btn-back { background: white; color: #0d9488; }
</style>
</head>
<body>
<div>
<div class="error-code">404</div>
<h1>😕 الصفحة غير موجودة</h1>
<p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
<a href="" class="btn btn-home">🏠 الرئيسية</a>
<a href="javascript:history.back()" class="btn btn-back">↩ العودة</a>
</div>
</body>
</html>
