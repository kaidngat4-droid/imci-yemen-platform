# Redis Configuration for IMCI Platform
port 6379
bind 127.0.0.1
daemonize yes
pidfile /data/data/com.termux/files/usr/var/run/redis.pid
logfile /data/data/com.termux/files/home/imci-platform/logs/redis.log
dir /data/data/com.termux/files/usr/var/lib/redis

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
