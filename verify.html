<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحقق - IMCI Yemen</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:linear-gradient(135deg,#0d9488,#134e4a); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.box { background:white; border-radius:20px; padding:35px; max-width:450px; width:100%; text-align:center; }
input { width:100%; padding:14px; border:2px solid #e2e8f0; border-radius:12px; font-size:16px; text-align:center; margin:15px 0; }
.btn { width:100%; padding:14px; background:#0d9488; color:white; border:none; border-radius:12px; font-size:18px; font-weight:700; cursor:pointer; }
.result { margin-top:15px; padding:15px; border-radius:12px; display:none; }
.ok { background:#c6f6d5; color:#22543d; display:block; }
.err { background:#fed7d7; color:#9b2c2c; display:block; }
</style>
</head>
<body>
<div class="box">
<h2>🔍 التحقق من الشهادة</h2>
<input type="text" id="c" placeholder="IMCI-2026-XXXX" value="IMCI-2026-0001">
<button class="btn" onclick="v()">تحقق</button>
<div id="r" class="result"></div>
</div>
<script>
function v(){
const c=document.getElementById('c').value.trim();
const r=document.getElementById('r');
if(c.startsWith('IMCI-')){r.className='result ok';r.innerHTML='<h3>✅ شهادة صالحة</h3><p>'+c+'</p>';}
else{r.className='result err';r.innerHTML='<h3>❌ غير صالحة</h3>';}
}
</script>
</body>
</html>
