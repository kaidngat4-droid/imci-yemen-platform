<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير الأداء - IMCI Yemen</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#14b8a6;--gold:#d4af37;--dark:#0f172a;--light:#cbd5e1;--danger:#CE1126;--success:#7cb342}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:#fff;min-height:100vh;padding-top:180px}
.flag{display:flex;height:5px;position:fixed;top:0;left:0;right:0;z-index:10001}
.flag-r{flex:1;background:#CE1126}.flag-w{flex:1;background:#fff}.flag-b{flex:1;background:#000}
.top-bar{position:fixed;top:5px;left:0;right:0;z-index:10000;background:linear-gradient(180deg,#1a1a2e,#16213e);box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.header{text-align:center;padding:15px}
.header img{width:70px;margin-bottom:5px}
.header h1{font-family:'Amiri',serif;color:var(--gold);font-size:1.3rem}
.nav{display:flex;gap:6px;justify-content:center;padding:8px;background:rgba(0,0,0,0.3);flex-wrap:wrap}
.nav a{color:var(--gold);text-decoration:none;padding:5px 10px;font-weight:600;font-size:0.8rem;border-radius:8px}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,0.06);border-radius:20px;padding:25px;margin:20px 0}
.card h2{color:#5eead4;font-family:'Amiri',serif;margin-bottom:15px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;margin:20px 0}
.stat{background:#1a1a2e;border-radius:16px;padding:20px;text-align:center}
.stat-num{font-size:32px;font-weight:900;color:#5eead4}
.stat-label{color:var(--light);font-size:0.85rem}
.progress-bar{background:rgba(255,255,255,0.1);height:10px;border-radius:10px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--primary),var(--success))}
table{width:100%;border-collapse:collapse;margin:15px 0}
th{background:rgba(255,255,255,0.1);padding:12px;text-align:right;color:var(--gold)}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.05)}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700}
.badge-success{background:rgba(124,179,66,0.2);color:var(--success)}
.badge-warning{background:rgba(212,175,55,0.2);color:var(--gold)}
.btn{padding:12px 28px;border-radius:30px;border:none;font-weight:700;cursor:pointer;font-family:'Cairo';font-size:1rem;text-decoration:none;display:inline-block}
.btn-primary{background:var(--primary);color:#fff}
.sig{background:#0d2b1e;padding:16px;text-align:center;border-top:1px solid var(--gold);margin-top:30px}
.sig span{color:#888;font-size:0.7rem}.sig strong{color:var(--gold)}
</style>
</head>
<body>
<div class="flag"><div class="flag-r"></div><div class="flag-w"></div><div class="flag-b"></div></div>
<div class="top-bar">
<div class="header"><img src="images/yemen-eagle.png" alt="Yemen"><h1>📊 تقرير الأداء</h1></div>
<div class="nav"><a href="">🏠 الرئيسية</a><a href="quiz.html">✅ اختبار</a><a href="protocol.html">📋 بروتوكولات</a></div>
</div>
<div class="container">
<div class="stat-grid">
<div class="stat"><div class="stat-num" id="totalTests">0</div><div class="stat-label">اختبارات</div></div>
<div class="stat"><div class="stat-num" style="color:var(--success);" id="passedTests">0</div><div class="stat-label">ناجح</div></div>
<div class="stat"><div class="stat-num" style="color:var(--gold);" id="avgScore">0%</div><div class="stat-label">متوسط</div></div>
<div class="stat"><div class="stat-num" style="color:var(--danger);" id="bestScore">0%</div><div class="stat-label">أعلى</div></div>
</div>
<div class="card">
<h2>📈 التقدم العام</h2>
<div class="progress-bar"><div class="progress-fill" id="overallProgress" style="width:0%"></div></div>
<p style="text-align:center;margin-top:10px;"><span id="progressPercent">0%</span> مكتمل</p>
</div>
<div class="card">
<h2>📋 سجل الاختبارات</h2>
<table><thead><tr><th>التاريخ</th><th>النتيجة</th><th>الحالة</th></tr></thead><tbody id="historyTable"><tr><td colspan="3" style="text-align:center;color:var(--light);">لا توجد اختبارات بعد</td></tr></tbody></table>
</div>
<div style="text-align:center;"><a href="quiz.html" class="btn btn-primary">✅ بدء اختبار جديد</a></div>
</div>
<div class="sig"><span>🌐 Engineered & Designed by</span><br><strong>Dr. Salah Al-Ahdal</strong></div>
<script>
const results=JSON.parse(localStorage.getItem('imci-results')||'[]');
document.getElementById('totalTests').textContent=results.length;
const passed=results.filter(r=>r.passed).length;
document.getElementById('passedTests').textContent=passed;
if(results.length>0){
const avg=Math.round(results.reduce((s,r)=>s+r.score,0)/results.length);
const best=Math.max(...results.map(r=>r.score));
document.getElementById('avgScore').textContent=avg+'%';
document.getElementById('bestScore').textContent=best+'%';
document.getElementById('overallProgress').style.width=Math.min(passed*33,100)+'%';
document.getElementById('progressPercent').textContent=Math.min(passed*33,100)+'%';
document.getElementById('historyTable').innerHTML=results.slice(-10).reverse().map(r=>'<tr><td>'+r.date+'</td><td>'+r.score+'%</td><td><span class="badge '+(r.passed?'badge-success':'badge-warning')+'">'+(r.passed?'✅ ناجح':'⚠️ راسب')+'</span></td></tr>').join('');
}
</script>
</body>
</html>
