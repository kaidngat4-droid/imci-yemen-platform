<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMCI - Age Calculator</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --primary:#14b8a6; --gold:#d4af37; --dark:#0f172a; --light:#cbd5e1; --danger:#CE1126; }
body { font-family:'Cairo',sans-serif; background:var(--dark); color:#fff; min-height:100vh; }
.flag { display:flex; height:5px; }
.flag-r { flex:1; background:#CE1126; } .flag-w { flex:1; background:#fff; } .flag-b { flex:1; background:#000; }
.header { text-align:center; padding:20px; background:linear-gradient(180deg,#1a1a2e,#16213e); }
.header img { width:80px; }
.header h1 { font-family:'Amiri',serif; color:var(--gold); font-size:1.5rem; }
.container { max-width:600px; margin:auto; padding:20px; }
.card { background:rgba(255,255,255,0.06); border-radius:20px; padding:25px; margin:15px 0; }
.card h2 { color:#5eead4; margin-bottom:15px; font-family:'Amiri',serif; }
.input-group { margin:15px 0; }
.input-group label { display:block; margin-bottom:8px; color:var(--light); font-weight:600; }
.input-group input { width:100%; padding:12px 15px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); background:#1a1a2e; color:#fff; font-family:'Cairo'; font-size:1rem; }
.btn { display:inline-block; padding:12px 28px; border-radius:30px; border:none; font-weight:700; cursor:pointer; font-family:'Cairo'; font-size:1rem; transition:0.3s; width:100%; background:var(--primary); color:#fff; }
.btn:hover { background:#0d9488; transform:translateY(-2px); }
.result { background:#1a1a2e; border-radius:16px; padding:20px; margin-top:20px; border-right:4px solid var(--primary); display:none; }
.result.show { display:block; animation:slideIn 0.4s; }
.age-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin:15px 0; }
.age-item { text-align:center; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; }
.age-num { font-size:2rem; font-weight:900; color:#5eead4; }
.age-label { font-size:0.85rem; color:var(--light); margin-top:5px; }
.age-group { display:inline-block; padding:8px 20px; border-radius:20px; font-weight:700; margin-top:10px; }
.group-infant { background:var(--danger); color:#fff; }
.group-young { background:var(--primary); color:#fff; }
.group-older { background:var(--gold); color:#1a1a1a; }
.nav { display:flex; gap:10px; justify-content:center; padding:10px; flex-wrap:wrap; }
.nav a { color:var(--gold); text-decoration:none; padding:8px 14px; font-weight:600; border-radius:8px; transition:0.3s; }
.nav a:hover { background:rgba(212,175,55,0.15); }
.sig { background:#0d2b1e; padding:16px; text-align:center; border-top:1px solid var(--gold); margin-top:30px; }
.sig span { color:#888; font-size:0.7rem; }
.sig strong { color:var(--gold); }
@keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="flag"><div class="flag-r"></div><div class="flag-w"></div><div class="flag-b"></div></div>
<header class="header">
<img src="images/yemen-eagle.png" alt="Yemen">
<h1>🧮 حاسبة العمر</h1>
<p style="color:#5eead4;">حساب عمر الطفل بالأشهر والأيام (IMCI)</p>
</header>
<nav class="nav">
<a href="">🏠 الرئيسية</a>
<a href="decision-tree.html">🌳 شجرة القرارات</a>
</nav>
<div class="container">
<div class="card">
<div class="input-group">
<label>أدخل تاريخ الميلاد</label>
<input type="date" id="birthDate">
</div>
<div class="input-group">
<label>تاريخ اليوم</label>
<input type="date" id="todayDate">
</div>
<button class="btn" onclick="calc()">احسب العمر</button>
<div class="result" id="result">
<div class="age-grid">
<div class="age-item"><div class="age-num" id="years">0</div><div class="age-label">سنوات</div></div>
<div class="age-item"><div class="age-num" id="months">0</div><div class="age-label">شهور</div></div>
<div class="age-item"><div class="age-num" id="days">0</div><div class="age-label">أيام</div></div>
</div>
<div style="text-align:center;margin-top:15px;">
<span class="age-group" id="ageGroup"></span>
</div>
</div>
</div>
</div>
<div class="sig"><span>🌐 Engineered & Designed by</span><br><strong>Dr. Salah Al-Ahdal</strong></div>
<script>
document.getElementById('todayDate').valueAsDate = new Date();
function calc() {
const b = new Date(document.getElementById('birthDate').value);
const t = new Date(document.getElementById('todayDate').value);
if (!b.getTime() || !t.getTime() || b > t) return alert('أدخل تواريخ صحيحة');
let y = t.getFullYear() - b.getFullYear(), m = t.getMonth() - b.getMonth(), d = t.getDate() - b.getDate();
if (d < 0) { m--; d += new Date(t.getFullYear(), t.getMonth(), 0).getDate(); }
if (m < 0) { y--; m += 12; }
document.getElementById('years').textContent = y;
document.getElementById('months').textContent = m;
document.getElementById('days').textContent = d;
const tm = y * 12 + m;
const g = document.getElementById('ageGroup');
if (tm < 2) { g.className = 'age-group group-infant'; g.textContent = 'رضيع (< 2 شهر)'; }
else if (tm <= 60) { g.className = 'age-group group-young'; g.textContent = 'صغير (2 شهر - 5 سنوات)'; }
else { g.className = 'age-group group-older'; g.textContent = 'كبير (> 5 سنوات)'; }
document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
